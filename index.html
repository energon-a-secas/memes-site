<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *.convex.cloud; connect-src 'self' *.convex.cloud; frame-ancestors 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme Vault | Browse and Vote on Memes</title>
  <meta name="description" content="Browse, search, and download memes organized by category, from Simpsons classics to anime references">
  <meta property="og:title" content="Meme Vault — Browse and Vote on Memes">
  <meta property="og:description" content="Browse, search, and download memes organized by category">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://memes.neorgon.com/">
  <meta property="og:site_name" content="Neorgon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Meme Vault — Browse and Vote on Memes">
  <meta name="twitter:description" content="Browse, search, and download memes organized by category">
  <meta name="twitter:image" content="https://memes.neorgon.com/og-preview.jpg">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://memes.neorgon.com/">
  <meta property="og:locale" content="en_US">
  <meta property="og:image" content="https://memes.neorgon.com/og-preview.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="theme-color" content="#040714">
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Meme Vault",
    "description": "Browse, search, and download memes organized by category. Login to build your collection or go anonymous",
    "url": "https://memes.neorgon.com/",
    "applicationCategory": "EntertainmentApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "author": { "@type": "Organization", "name": "Neorgon", "url": "https://neorgon.com/" }
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="header-bar">
    <a class="header-logo" href="https://talentmemes.lucianoadonis.com/">
      <img src="energon-classic-logo.png" class="header-logo-img" alt="Neorgon">
      <div>
        <h1>Meme Vault</h1>
        <div class="header-subtitle" id="subtitle">67 internal jokes</div>
      </div>
    </a>
    <nav>
      <button class="nav-link nav-link--random" id="randomBtn" title="Random meme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;margin-right:4px"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        Random
      </button>
      <button class="nav-link" id="uploadToggle" style="color:var(--accent);border-color:rgba(0,99,229,.2)">Upload</button>
      <button class="auth-toggle" id="authToggle" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M7.5 6.5C7.5 8.981 9.519 11 12 11s4.5-2.019 4.5-4.5S14.481 2 12 2 7.5 4.019 7.5 6.5zM20 21h1v-1c0-3.859-3.141-7-7-7h-4c-3.86 0-7 3.141-7 7v1h17z"/>
        </svg>
      </button>
      <a class="header-home" href="https://neorgon.com/" title="neorgon.com" aria-label="Neorgon home" style="margin-left:5px">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </a>
    </nav>
  </header>

  <!-- Auth panel (collapsible, below header) -->
  <div class="auth-panel" id="authPanel">
    <div class="auth-panel-inner">
      <div id="authGate">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Log In</button>
          <button class="auth-tab" data-tab="register">Register</button>
        </div>
        <div class="auth-form" id="authLoginForm">
          <input type="text" id="authLoginUser" placeholder="Username" autocomplete="username" maxlength="20">
          <input type="password" id="authLoginPass" placeholder="Password" autocomplete="current-password">
          <button class="auth-submit" id="authLoginBtn">Log In</button>
        </div>
        <div class="auth-form" id="authRegisterForm" hidden>
          <input type="text" id="authRegUser" placeholder="Choose a username" autocomplete="username" maxlength="20">
          <input type="password" id="authRegPass" placeholder="Choose a password" autocomplete="new-password">
          <button class="auth-submit" id="authRegBtn">Register</button>
        </div>
      </div>
      <div id="authUser" hidden>
        <span class="auth-username" id="authUsername"></span>
        <span class="auth-role" id="authRole" hidden>admin</span>
        <button class="auth-logout" id="authLogout">Log out</button>
      </div>
    </div>
  </div>
  <div class="auth-divider"></div>

  <main class="container" id="main">

    <!-- Upload panel -->
    <div class="upload-panel" id="uploadPanel">
      <h3>Upload Meme</h3>
      <!-- Login prompt (shown when not logged in) -->
      <div id="uploadLoginPrompt">
        <p class="upload-login-msg">Log in to upload memes.</p>
      </div>
      <!-- Upload zone (shown when logged in) -->
      <div id="uploadZone" style="display:none">
        <div class="drop-zone" id="dropZone">Drop an image here, or click to browse</div>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none">
        <div id="uploadPreview" style="display:none">
          <div class="upload-preview">
            <img id="previewImg" src="" alt="preview">
            <div class="upload-fields">
              <input type="text" id="memeNameInput" placeholder="Meme name">
              <select id="memeCatSelect">
                <option value="general">general</option>
                <option value="anime">anime</option>
                <option value="country">country</option>
                <option value="games">games</option>
                <option value="mood">mood</option>
                <option value="movie-reference">movie-reference</option>
                <option value="other-references">other-references</option>
                <option value="series">series</option>
                <option value="simpsons">simpsons</option>
                <option value="talent">talent</option>
                <option value="templates">templates</option>
              </select>
              <label class="anon-label">
                <input type="checkbox" id="anonCheck" checked> Post anonymously
              </label>
            </div>
          </div>
          <button class="upload-submit-btn" id="uploadSubmit">Upload Meme</button>
        </div>
      </div>
    </div>

    <!-- Meme of the Day -->
    <div class="motd-banner" id="motdBanner" style="display:none">
      <div class="motd-label">Meme of the Day</div>
      <div class="motd-content">
        <img class="motd-img" id="motdImg" src="" alt="">
        <div class="motd-info">
          <div class="motd-name" id="motdName"></div>
          <div class="motd-actions">
            <button class="motd-btn" id="motdView" title="View full size">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              View
            </button>
            <button class="motd-btn" id="motdCopy" title="Copy image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              Copy
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search 67 internal jokes..." autocomplete="off" spellcheck="false">
    </div>

    <!-- Recently added (Convex uploads) -->
    <div class="recent-section" id="recentSection" style="display:none">
      <h2 class="section-heading">Recently Added</h2>
      <div class="recent-row" id="recentRow"></div>
    </div>

    <div class="chips" id="chips"></div>

    <div class="toolbar-row">
      <div class="result-info" id="resultInfo"></div>
      <div class="sort-controls">
        <label class="sort-label" for="sortSelect">Sort:</label>
        <select id="sortSelect" class="sort-select">
          <option value="default">Default</option>
          <option value="votes">Most Voted</option>
        </select>
      </div>
    </div>

    <div class="meme-grid" id="memeGrid"></div>

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lbNext" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="">
      <div class="lightbox-info">
        <div class="lightbox-name" id="lightboxName"></div>
        <div class="lightbox-counter" id="lightboxCounter"></div>
        <div class="lightbox-actions">
          <button class="lightbox-btn" id="lbCopyUrl" title="Copy URL">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            <span>Copy URL</span>
          </button>
          <button class="lightbox-btn" id="lbCopyImg" title="Copy Image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <span>Copy Image</span>
          </button>
          <button class="lightbox-btn" id="lbDownload" title="Download">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>Download</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer class="info-footer">
    Meme Vault &middot;
    <a href="https://neorgon.com/">neorgon.com</a>
  </footer>

  <div id="toast"></div>

  <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script type="module" src="js/app.js"></script>

</body>
</html>
